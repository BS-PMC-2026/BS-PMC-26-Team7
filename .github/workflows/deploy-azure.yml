name: Deploy Hadinerim to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./pepper-farm/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy Backend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: hadinerim
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./pepper-farm/backend

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    concurrency:
      group: hadinerimfront-production
      cancel-in-progress: true

    defaults:
      run:
        working-directory: ./pepper-farm/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./pepper-farm/frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      # GitHub Actions builds the Next.js app. Azure receives a ready-to-run ZIP;
      # Azure-side Oryx/Kudu build must remain disabled for this App Service.
      - name: Build Frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://hadinerim.azurewebsites.net
          API_PROXY_TARGET: https://hadinerim.azurewebsites.net

      - name: Prepare Standalone Frontend Package
        run: |
          rm -rf deploy frontend-package.zip
          mkdir -p deploy
          cp -a .next/standalone/. deploy/
          rm -f deploy/.env deploy/.env.*
          mkdir -p deploy/.next
          cp -a .next/static deploy/.next/static
          if [ -d public ]; then cp -a public deploy/public; fi
          cd deploy
          zip -r ../frontend-package.zip .
          cd ..
          ls -lh frontend-package.zip
          unzip -l frontend-package.zip | head -100

      - name: Deploy Frontend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: Hadinerimfront
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: pepper-farm/frontend/frontend-package.zip
