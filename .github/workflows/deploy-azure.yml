name: Deploy Hadinerim to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./pepper-farm/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy Backend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: hadinerim
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./pepper-farm/backend

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend

    defaults:
      run:
        working-directory: ./pepper-farm/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./pepper-farm/frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://hadinerim.azurewebsites.net

      - name: Prepare Frontend Package
        run: |
          rm -rf node_modules
          rm -rf .next/cache
          zip -r ../../frontend-package.zip . \
            -x "node_modules/*" \
            -x ".next/cache/*" \
            -x ".env" \
            -x ".git/*"

      - name: Wait before Azure Deploy
        run: sleep 30
        working-directory: .

      - name: Deploy Frontend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: Hadinerimfront
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend-package.zip
