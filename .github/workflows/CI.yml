name: CI

on:
  push:
    branches: [ "develop", "hackaton_2026" ]
  pull_request:
    branches: [ "develop", "hackaton_2026" ]
  workflow_dispatch:

jobs:
  backend-build-test-package:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pepper-farm/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run backend tests
        run: pytest tests

      - name: Create backend package
        run: |
          mkdir -p ../../artifacts
          zip -r ../../artifacts/backend-package.zip . \
            -x "__pycache__/*" \
            -x ".pytest_cache/*" \
            -x "*.pyc" \
            -x ".env"

      - name: Upload backend package artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: artifacts/backend-package.zip

  frontend-language-layout-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pepper-farm/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pepper-farm/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --watch=false

      - name: Build frontend
        run: npm run build