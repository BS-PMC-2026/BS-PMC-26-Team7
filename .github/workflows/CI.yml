name: CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pepper-farm/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run tests
        run: pytest tests

      - name: Create backend package
        run: |
          mkdir -p ../../artifacts
          zip -r ../../artifacts/backend-package.zip . \
            -x "__pycache__/*" \
            -x ".pytest_cache/*" \
            -x "*.pyc" \
            -x ".env"

      - name: Upload backend package artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: artifacts/backend-package.zip
